name: Deploy Infra + App # define el nombre del flujo

on:  # aca damos inicio al evento que dispara el flujo

  push:

    branches: [ main ]

jobs: # cotenedor de todas las tareas

  deploy: # nombre de el trabajo especifico

    runs-on: ubuntu-latest # expecifica la version de ubuntu que ejecutara la maquina

    steps:

      # 1. Clonar repo

      - name: Checkout code

        uses: actions/checkout@v3

      # 2. Configurar AWS

      - name: Configure AWS Credentials

        uses: aws-actions/configure-aws-credentials@v2 # uses son las acciones plantillas prefabricas para usar 

        with:

          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          aws-region: us-east-1

      # 3. Instalar Terraform

      - name: Setup Terraform

        uses: hashicorp/setup-terraform@v2

        with:

          terraform_wrapper: false 

      # 4. Inicializar Terraform

      - name: Terraform Init

        run: terraform init

        working-directory: infra/

      # 5. Crear infraestructura

      - name: Terraform Apply

        run: terraform apply -auto-approve

        working-directory: infra/

      # 6. Obtener nombre del bucket (Versión simplificada y robusta)

      - name: Get bucket name

        id: tf_output

        run: |

          # El flag -raw extrae el texto puro sin comillas ni formato JSON

          BUCKET=$(terraform output -raw bucket_name)

          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

        working-directory: infra/

      # 7. Subir app a S3

      - name: Deploy to S3

        # Usamos la salida del paso anterior

        run: aws s3 sync app/ s3://${{ steps.tf_output.outputs.bucket }} --delete


      # 8. Mostrar URL

      - name: Show Website URL

        run: terraform output website_url

        working-directory: infra/
 